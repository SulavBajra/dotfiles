# Tokyo Night Dark — fuzzel
# Launch: Super+D
# Place at: ~/.config/fuzzel/fuzzel.ini

[main]
font=JetBrainsMono Nerd Font:size=13
dpi-aware=yes
prompt=  
terminal=ghostty -e
lines=10
width=40
horizontal-pad=16
vertical-pad=10
inner-pad=6
image-size-ratio=0.5
anchor=center
layer=overlay

[colors]
# bg / text / match / selection / selection-text / selection-match / border
background=0a0a0fea
text=c0caf5ff
match=7aa2f7ff
selection=12121aff
selection-text=c0caf5ff
selection-match=7aa2f7ff
border=7aa2f740

[border]
width=1
radius=8

[dmenu]
exit-immediately-if-empty=yes
